# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  upload:
    # The type of runner that the job will run on
    name: Upload
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Package
        run: |
          test -f build/test.zip
          if [ $? -ne 0 ]; then
            echo "Package build/test.zip not found"
            exit 1
          fi
        
      - name: New Version
        env:
          VERSION: 3.0.${{ github.run_number }}
        run: |
          echo "New version: $VERSION"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: build/test.zip

  trivy-scan:
    name: Trivy Vulnerability Scan
    needs: upload
    runs-on: ubuntu-latest


    steps:
      # [중요] 이전 Job에서 업로드한 파일을 다운로드함
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-package
          path: build/

      - name: Unzip and Set Permission
        run: |
          # 1. build 디렉토리에 있는 test.zip 압축을 ./extracted_files 폴더에 풉니다.
          unzip build/test.zip -d ./extracted_files
          pwd
          ls -R ./extracted_files
          
          # 2. C 바이너리 파일(pfcp)에 실행 권한(+x)을 부여합니다. 
          # 리눅스 환경에서 실행 권한이 있어야 Trivy가 이를 '바이너리 실행 파일'로 정확히 인식합니다.
          chmod +x ./extracted_files/pfcp 

      - name: Run Trivy Scan on C Binary (Manual)
        # 이미 앞선 단계에서 setup-trivy가 되어 있으므로 바로 trivy 명령어를 쓸 수 있습니다.
        run: |
          trivy fs \
            --scanners vuln \
            --vuln-type binary \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            ./extracted_files

