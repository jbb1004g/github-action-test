# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  upload:
    # The type of runner that the job will run on
    name: Upload
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Package
        run: |
          test -f build/test.zip
          if [ $? -ne 0 ]; then
            echo "Package build/test.zip not found"
            exit 1
          fi
        
      - name: New Version
        env:
          VERSION: 3.0.${{ github.run_number }}
        run: |
          echo "New version: $VERSION"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: build/test.zip

  trivy-scan:
    name: Trivy Vulnerability Scan
    needs: upload
    runs-on: ubuntu-latest


    steps:
      # [중요] 이전 Job에서 업로드한 파일을 다운로드함
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-package
          path: build/

      - name: Unzip and Set Permission
        run: |
          # 1. build 디렉토리에 있는 test.zip 압축을 ./extracted_files 폴더에 풉니다.
          unzip build/test.zip -d ./extracted_files
          
          # 2. C 바이너리 파일(pfcp)에 실행 권한(+x)을 부여합니다. 
          # 리눅스 환경에서 실행 권한이 있어야 Trivy가 이를 '바이너리 실행 파일'로 정확히 인식합니다.
          chmod +x ./extracted_files/pfcp 

      - name: Run Trivy Scan on C Binary
        uses: aquasecurity/trivy-action@master
        with:
          # 스캔 대상을 지정합니다. 'fs'는 File System의 약자로, 로컬 폴더나 파일을 뒤지겠다는 뜻입니다.
          scan-type: 'fs'
          
          # 스캔할 경로입니다. 위에서 압축을 푼 폴더를 지정합니다.
          scan-ref: './extracted_files'
          
          # 결과 출력 방식입니다. 터미널 로그에서 사람이 보기 편하도록 '표(table)' 형태로 보여줍니다.
          format: 'table'
          
          # 취약점이 발견되었을 때의 동작입니다. '1'로 설정하면 취약점 발견 시 빌드를 실패(Fail) 처리합니다.
          exit-code: '1'
          
          # 리포트에 포함할 위험도 수준입니다. 'CRITICAL(치명적)'과 'HIGH(높음)' 수준만 필터링해서 보여줍니다.
          severity: 'CRITICAL,HIGH'
          
          # 스캔할 대상의 유형입니다. 'os' 패키지와 일반 'library' 의존성을 모두 포함합니다.
          vuln-type: 'os,library' 
          
          # [핵심] Trivy 공식 액션에 추가로 전달할 명령어 인자입니다.
          # --scanners vuln: 취약점 스캔 기능을 활성화합니다.
          # --vuln-type binary: 컴파일된 C/C++ '바이너리' 파일 내부의 라이브러리 취약점을 찾아내도록 강제합니다.
          additional-args: '--scanners vuln --vuln-type binary'
